[package]
name = "cosmix-scripts"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Mix + Bash script manager for Cosmix — list, run, edit, delete scripts"

[[bin]]
name = "cosmix-scripts"
path = "src/main.rs"

[dependencies]
clap.workspace = true
mimalloc.workspace = true
tokio.workspace = true
dirs-next = "2"
mix-core = { path = "../../../../.mix/src/crates/mix-core", features = ["json"] }
cosmix_config = { package = "cosmix-lib-config", path = "../cosmix-lib-config" }
cosmix_client = { package = "cosmix-lib-client", path = "../cosmix-lib-client" }
cosmix_script = { package = "cosmix-lib-script", path = "../cosmix-lib-script", features = ["dialog"] }
